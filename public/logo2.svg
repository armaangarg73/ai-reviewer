<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="20" y1="20" x2="200" y2="200">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle
    cx="110"
    cy="110"
    r="85"
    stroke="url(#grad)"
    stroke-width="8"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Code brackets -->
  <path
    d="M70 80 L50 110 L70 140"
    stroke="url(#grad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <path
    d="M150 80 L170 110 L150 140"
    stroke="url(#grad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- AI eye -->
  <ellipse
    cx="110"
    cy="110"
    rx="28"
    ry="20"
    fill="#0B0F19"
    stroke="url(#grad)"
    stroke-width="4"
  />

  <circle
    cx="110"
    cy="110"
    r="8"
    fill="url(#grad)"
    filter="url(#glow)"
  />

  <!-- Spark -->
  <path
    d="M175 55 L180 70 L195 75 L180 80 L175 95 L170 80 L155 75 L170 70 Z"
    fill="#06B6D4"
  />
</svg>